<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Night</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;900&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0e1a;
  --surface: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --gold: #f5c842;
  --gold-dim: rgba(245,200,66,0.15);
  --red: #e8394a;
  --green: #2ecc71;
  --text: #ffffff;
  --text-dim: rgba(255,255,255,0.5);
  --blue: #3a8ef5;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: 'Barlow', sans-serif;
  color: var(--text);
  overflow: hidden;
}

body {
  background-image:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(245,200,66,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 20% 100%, rgba(58,142,245,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 40% 60% at 80% 60%, rgba(232,57,74,0.05) 0%, transparent 50%);
}

/* ── INTRO SCREEN ── */
#intro-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 100;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(245,200,66,0.1) 0%, transparent 60%);
  transition: opacity 0.6s ease;
}

#intro-screen.hide { opacity: 0; pointer-events: none; }

.intro-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--gold);
  text-transform: uppercase;
  border: 1px solid rgba(245,200,66,0.3);
  padding: 6px 16px;
  border-radius: 20px;
}

.intro-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(80px, 12vw, 140px);
  line-height: 0.9;
  text-align: center;
  letter-spacing: 0.02em;
  color: var(--text);
}

.intro-title span { color: var(--gold); }

.intro-sub {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.intro-categories {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 10px;
}

.intro-cat {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text-dim);
}

.intro-start {
  margin-top: 20px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.2em;
  color: var(--gold);
  animation: blink 1.4s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── GAME SCREEN ── */
#game-screen {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 32px 48px 28px;
  gap: 0;
  opacity: 0;
  transition: opacity 0.6s ease;
}

#game-screen.show { opacity: 1; }

/* Header */
.game-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.game-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 0.08em;
  color: var(--gold);
  opacity: 0.7;
}

.category-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 6px 18px;
  border-radius: 20px;
  border: 1.5px solid currentColor;
  transition: all 0.3s ease;
}

.cat-sports      { color: #3a8ef5; border-color: rgba(58,142,245,0.4); background: rgba(58,142,245,0.08); }
.cat-popculture  { color: #e84daa; border-color: rgba(232,77,170,0.4); background: rgba(232,77,170,0.08); }
.cat-geography   { color: #2ecc71; border-color: rgba(46,204,113,0.4); background: rgba(46,204,113,0.08); }
.cat-history     { color: #f5a623; border-color: rgba(245,166,35,0.4); background: rgba(245,166,35,0.08); }
.cat-science     { color: #a855f7; border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.08); }
.cat-random      { color: #f5c842; border-color: rgba(245,200,66,0.4); background: rgba(245,200,66,0.08); }

.q-counter {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* Question */
.question-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 36px;
}

.question-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(32px, 4.5vw, 58px);
  font-weight: 700;
  line-height: 1.15;
  color: var(--text);
  letter-spacing: 0.01em;
  text-align: center;
  padding: 0 40px;
  animation: slideIn 0.5s ease both;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Answers grid */
.answers-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  padding: 0 20px;
}

.answer-btn {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 28px;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  cursor: default;
  transition: all 0.4s ease;
  animation: slideIn 0.5s ease both;
  min-height: 80px;
}

.answer-btn:nth-child(1) { animation-delay: 0.1s; }
.answer-btn:nth-child(2) { animation-delay: 0.15s; }
.answer-btn:nth-child(3) { animation-delay: 0.2s; }
.answer-btn:nth-child(4) { animation-delay: 0.25s; }

.answer-letter {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  color: var(--gold);
  width: 32px;
  flex-shrink: 0;
  line-height: 1;
}

.answer-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(20px, 2.2vw, 30px);
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: 0.01em;
}

.answer-btn.eliminated {
  opacity: 0;
  transform: scale(0.95);
  pointer-events: none;
}

.answer-btn.correct {
  background: rgba(46,204,113,0.15);
  border-color: var(--green);
  transform: scale(1.02);
}

.answer-btn.correct .answer-letter { color: var(--green); }
.answer-btn.correct .answer-text   { color: var(--green); }

/* Timer bar */
.timer-wrap {
  margin-top: 28px;
  position: relative;
}

.timer-bar-bg {
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
}

.timer-bar {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--gold), #f5a623);
  transition: width 1s linear, background 0.5s ease;
  width: 100%;
}

.timer-bar.warning { background: linear-gradient(90deg, #e8394a, #f5623a); }

.timer-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.timer-seconds {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: var(--gold);
  line-height: 1;
  transition: color 0.3s;
}

.timer-seconds.warning { color: var(--red); }

.timer-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* Answer reveal overlay */
.reveal-banner {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(46,204,113,0.95);
  border-radius: 20px;
  padding: 24px 48px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  letter-spacing: 0.1em;
  color: white;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  z-index: 50;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.reveal-banner.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

/* Next question transition */
.next-label {
  text-align: center;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 6px;
  min-height: 16px;
}
</style>
</head>

// ══════════════════════════════════════════════
// GAME ENGINE
// ══════════════════════════════════════════════
const TOTAL_SECONDS = 40;
const ELIM_1 = 30; // eliminate first wrong answer
const ELIM_2 = 35; // eliminate second wrong answer
const REVEAL = 40; // reveal correct
const NEXT_Q = 47; // load next question

const CAT_STYLES = {
  sports:     { label: '🏆 Sports',      cls: 'cat-sports'     },
  popculture: { label: '🎬 Pop Culture', cls: 'cat-popculture' },
  geography:  { label: '🌍 Geography',   cls: 'cat-geography'  },
  history:    { label: '📜 History',     cls: 'cat-history'    },
  science:    { label: '🔬 Science',     cls: 'cat-science'    },
  random:     { label: '🎲 Random',      cls: 'cat-random'     },
};

const LETTERS = ['A', 'B', 'C', 'D'];

let shuffled = [];
let qIndex   = 0;
let elapsed  = 0;
let timer    = null;
let currentQ = null;
let wrongIndices = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepareQuestions() {
  shuffled = shuffle(QUESTIONS);
  qIndex   = 0;
}

function loadQuestion() {
  if (qIndex >= shuffled.length) {
    prepareQuestions(); // loop
  }

  currentQ = shuffled[qIndex++];
  elapsed  = 0;

  // Shuffle answers but track correct
  const correctAnswer = currentQ.a[currentQ.correct];
  const shuffledAnswers = shuffle(currentQ.a);
  const newCorrectIndex = shuffledAnswers.indexOf(correctAnswer);

  // Build wrong indices (all except correct)
  wrongIndices = shuffle(
    shuffledAnswers.map((_,i) => i).filter(i => i !== newCorrectIndex)
  );

  // Update category badge
  const catStyle = CAT_STYLES[currentQ.cat];
  const badge = document.getElementById('cat-badge');
  badge.textContent = catStyle.label;
  badge.className   = `category-badge ${catStyle.cls}`;

  // Update counter
  document.getElementById('q-counter').textContent = `Question ${qIndex}`;

  // Update question
  const qEl = document.getElementById('question-text');
  qEl.style.animation = 'none';
  qEl.offsetHeight; // reflow
  qEl.style.animation = '';
  qEl.textContent = currentQ.q;

  // Build answers
  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  shuffledAnswers.forEach((ans, i) => {
    const btn = document.createElement('div');
    btn.className = 'answer-btn';
    btn.id = `ans-${i}`;
    btn.dataset.correct = (i === newCorrectIndex) ? '1' : '0';
    btn.style.animationDelay = `${0.1 + i * 0.06}s`;
    btn.innerHTML = `
      <div class="answer-letter">${LETTERS[i]}</div>
      <div class="answer-text">${ans}</div>
    `;
    grid.appendChild(btn);
  });

  // Reset timer bar
  const bar = document.getElementById('timer-bar');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.className = 'timer-bar';
  document.getElementById('timer-seconds').className = 'timer-seconds';
  document.getElementById('next-label').textContent = '';

  // Start timer
  if (timer) clearInterval(timer);
  elapsed = 0;
  updateTimerDisplay();
  timer = setInterval(tick, 1000);
}

function updateTimerDisplay() {
  const remaining = TOTAL_SECONDS - elapsed;
  const pct = (remaining / TOTAL_SECONDS) * 100;

  const bar = document.getElementById('timer-bar');
  bar.style.transition = 'width 1s linear';
  bar.style.width = pct + '%';

  const secEl = document.getElementById('timer-seconds');
  secEl.textContent = Math.max(0, remaining);

  if (remaining <= 10) {
    bar.className = 'timer-bar warning';
    secEl.className = 'timer-seconds warning';
  }
}

function tick() {
  elapsed++;
  updateTimerDisplay();

  // Eliminate first wrong answer at 30s
  if (elapsed === ELIM_1) {
    const idx = wrongIndices[0];
    if (idx !== undefined) {
      document.getElementById(`ans-${idx}`)?.classList.add('eliminated');
    }
  }

  // Eliminate second wrong answer at 35s
  if (elapsed === ELIM_2) {
    const idx = wrongIndices[1];
    if (idx !== undefined) {
      document.getElementById(`ans-${idx}`)?.classList.add('eliminated');
    }
  }

  // Reveal correct at 40s
  if (elapsed === REVEAL) {
    clearInterval(timer);
    revealAnswer();
  }
}

function revealAnswer() {
  // Eliminate remaining wrong answers
  document.querySelectorAll('.answer-btn').forEach(btn => {
    if (btn.dataset.correct !== '1') {
      btn.classList.add('eliminated');
    } else {
      btn.classList.add('correct');
    }
  });

  // Show banner
  const banner = document.getElementById('reveal-banner');
  banner.classList.add('show');

  document.getElementById('next-label').textContent = 'Next question loading...';

  // Next question after 7 seconds
  setTimeout(() => {
    banner.classList.remove('show');
    setTimeout(loadQuestion, 600);
  }, 6000);
}

// ── START SEQUENCE ──
prepareQuestions();

setTimeout(() => {
  const intro = document.getElementById('intro-screen');
  intro.classList.add('hide');
  setTimeout(() => {
    intro.style.display = 'none';
    const game = document.getElementById('game-screen');
    game.classList.add('show');
    loadQuestion();
  }, 600);
}, 3500);
</script>
