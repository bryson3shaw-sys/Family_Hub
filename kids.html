<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Rule!</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #e8f4fd;
  --blue: #4a90d9;
  --blue-dark: #2e6faa;
  --orange: #f5a623;
  --orange-dark: #d4881a;
  --green: #5cb85c;
  --green-dark: #449944;
  --red: #e8394a;
  --purple: #9b59b6;
  --yellow: #f5e642;
  --pink: #e84daa;
  --white: #ffffff;
  --text: #1a2a3a;
  --text-light: #5a7a9a;
  --card: rgba(255,255,255,0.9);
  --radius: 24px;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  overflow: hidden;
}

body {
  background-image:
    radial-gradient(circle at 10% 20%, rgba(74,144,217,0.12) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(245,166,35,0.1) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(92,184,92,0.06) 0%, transparent 60%);
}

/* ── FLOATING DECORATIONS ── */
.deco {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  font-size: 32px;
  opacity: 0.18;
  animation: float 6s ease-in-out infinite;
}
.deco:nth-child(1)  { top: 5%;  left: 3%;  animation-delay: 0s;   font-size: 28px; }
.deco:nth-child(2)  { top: 12%; right: 5%; animation-delay: 1s;   font-size: 36px; }
.deco:nth-child(3)  { top: 80%; left: 2%;  animation-delay: 2s;   font-size: 24px; }
.deco:nth-child(4)  { top: 75%; right: 3%; animation-delay: 0.5s; font-size: 30px; }
.deco:nth-child(5)  { top: 45%; left: 1%;  animation-delay: 3s;   font-size: 20px; }
.deco:nth-child(6)  { top: 40%; right: 1%; animation-delay: 1.5s; font-size: 26px; }

@keyframes float {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50%      { transform: translateY(-12px) rotate(5deg); }
}

/* ── MAIN LAYOUT ── */
.hub {
  position: relative;
  z-index: 1;
  width: 100vw;
  height: 100vh;
  display: grid;
  grid-template-columns: 1fr;
  grid-template-rows: 1fr;
  padding: 20px;
  gap: 16px;
}

/* ── MAIN TRIVIA AREA ── */
.trivia-main {
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 0;
}

/* Header */
.trivia-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.kids-logo {
  font-family: 'Fredoka One', sans-serif;
  font-size: 32px;
  color: var(--blue-dark);
  line-height: 1;
}

.kids-logo span { color: var(--orange); }

.cat-pill {
  font-family: 'Fredoka One', sans-serif;
  font-size: 16px;
  padding: 8px 20px;
  border-radius: 30px;
  border: 3px solid currentColor;
  transition: all 0.3s ease;
}

.cat-math     { color: #2e6faa; background: rgba(46,111,170,0.12); }
.cat-letters  { color: #9b59b6; background: rgba(155,89,182,0.12); }
.cat-starwars { color: #c9aa71; background: rgba(201,170,113,0.12); }
.cat-minecraft{ color: #5d8a2a; background: rgba(93,138,42,0.12);  }
.cat-disney   { color: #e84daa; background: rgba(232,77,170,0.12); }
.cat-mario    { color: #e8394a; background: rgba(232,57,74,0.12);  }
.cat-animals  { color: #27ae60; background: rgba(39,174,96,0.12);  }

/* Question card */
.question-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 3px solid rgba(74,144,217,0.2);
  box-shadow: 0 8px 32px rgba(74,144,217,0.1);
  padding: 28px 36px;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  min-height: 0;
}

.question-emoji {
  font-size: 72px;
  margin-bottom: 12px;
  animation: bounce 1s ease-in-out infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}

.question-text {
  font-family: 'Fredoka One', sans-serif;
  font-size: clamp(32px, 4.5vw, 60px);
  color: var(--text);
  line-height: 1.25;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.85); }
  to   { opacity: 1; transform: scale(1); }
}

/* Answer buttons */
.answers-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.answer-btn {
  background: var(--card);
  border-radius: 20px;
  border: 3px solid transparent;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: default;
  transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}

.answer-btn:nth-child(1) { animation-delay: 0.1s; border-color: rgba(74,144,217,0.3);  background: rgba(74,144,217,0.06); }
.answer-btn:nth-child(2) { animation-delay: 0.15s; border-color: rgba(245,166,35,0.3); background: rgba(245,166,35,0.06); }
.answer-btn:nth-child(3) { animation-delay: 0.2s; border-color: rgba(92,184,92,0.3);   background: rgba(92,184,92,0.06);  }
.answer-btn:nth-child(4) { animation-delay: 0.25s; border-color: rgba(155,89,182,0.3); background: rgba(155,89,182,0.06); }

.answer-letter {
  font-family: 'Fredoka One', sans-serif;
  font-size: 24px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: white;
}

.answer-btn:nth-child(1) .answer-letter { background: var(--blue); }
.answer-btn:nth-child(2) .answer-letter { background: var(--orange); }
.answer-btn:nth-child(3) .answer-letter { background: var(--green); }
.answer-btn:nth-child(4) .answer-letter { background: var(--purple); }

.answer-text {
  font-family: 'Fredoka One', sans-serif;
  font-size: clamp(22px, 2.5vw, 34px);
  color: var(--text);
  line-height: 1.2;
}

.answer-btn.eliminated {
  opacity: 0;
  transform: scale(0.8);
  pointer-events: none;
}

.answer-btn.correct {
  background: rgba(92,184,92,0.2) !important;
  border-color: var(--green) !important;
  transform: scale(1.04);
}

.answer-btn.correct .answer-letter { background: var(--green) !important; }
.answer-btn.correct .answer-text   { color: var(--green-dark); }

/* Timer */
.timer-wrap {
  background: var(--card);
  border-radius: 20px;
  padding: 12px 20px;
  border: 3px solid rgba(74,144,217,0.15);
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}

.timer-bar-bg {
  width: 100%;
  height: 14px;
  background: rgba(0,0,0,0.06);
  border-radius: 7px;
  overflow: hidden;
}

.timer-bar {
  height: 100%;
  border-radius: 7px;
  background: linear-gradient(90deg, #4a90d9, #7bc6f5);
  transition: width 1s linear, background 0.5s ease;
  width: 100%;
}

.timer-bar.warning {
  background: linear-gradient(90deg, #e8394a, #f5623a);
}

.timer-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}

.timer-seconds {
  font-family: 'Fredoka One', sans-serif;
  font-size: 28px;
  color: var(--blue);
  line-height: 1;
  transition: color 0.3s;
}

.timer-seconds.warning { color: var(--red); }

.next-hint {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-light);
  letter-spacing: 0.05em;
}

/* ── CELEBRATION OVERLAY ── */
.celebrate {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.celebrate.show { opacity: 1; }

.celebrate-card {
  background: linear-gradient(135deg, var(--green), #3aaa5a);
  border-radius: 32px;
  padding: 32px 56px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  transform: scale(0.7);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

.celebrate.show .celebrate-card { transform: scale(1); }

.celebrate-emoji { font-size: 64px; }
.celebrate-text  {
  font-family: 'Fredoka One', sans-serif;
  font-size: 48px;
  color: white;
  line-height: 1.1;
  margin-top: 8px;
}

/* Confetti */
.confetti-piece {
  position: fixed;
  width: 10px; height: 10px;
  border-radius: 2px;
  pointer-events: none;
  z-index: 99;
  animation: confettiFall 3s ease-in forwards;
}

@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
</style>
</head>

// ══════════════════════════════════════════════
// GAME ENGINE
// ══════════════════════════════════════════════
const TOTAL_SECONDS = 30;
const ELIM_1 = 20;
const ELIM_2 = 26;

const CAT_CONFIG = {
  math:      { label: '🔢 Math',          cls: 'cat-math'     },
  letters:   { label: '📝 Letters',       cls: 'cat-letters'  },
  starwars:  { label: '⚔️ Star Wars',     cls: 'cat-starwars' },
  minecraft: { label: '⛏️ Minecraft',     cls: 'cat-minecraft'},
  disney:    { label: '🏰 Disney',        cls: 'cat-disney'   },
  mario:     { label: '🍄 Super Mario',   cls: 'cat-mario'    },
  animals:   { label: '🐾 Animals',       cls: 'cat-animals'  },
};

const CELEBRATE_MESSAGES = [
  { emoji: '🎉', text: 'That\'s right!' },
  { emoji: '⭐', text: 'You got it!' },
  { emoji: '🏆', text: 'Amazing!' },
  { emoji: '🎊', text: 'Correct!' },
  { emoji: '🌟', text: 'Awesome!' },
  { emoji: '🥳', text: 'Woohoo!' },
  { emoji: '👏', text: 'Great job!' },
  { emoji: '🚀', text: 'Super smart!' },
];

const LETTERS = ['A', 'B', 'C', 'D'];
const COLORS  = ['#4a90d9','#f5a623','#5cb85c','#9b59b6'];

let shuffled     = [];
let qIndex       = 0;
let elapsed      = 0;
let timer        = null;
let wrongIndices = [];
let score        = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepareQuestions() {
  shuffled = shuffle(QUESTIONS);
  qIndex   = 0;
}


function spawnConfetti() {
  const colors = ['#f5c842','#e8394a','#4a90d9','#5cb85c','#9b59b6','#f5a623','#e84daa'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left     = Math.random() * 100 + 'vw';
    el.style.top      = '-20px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width    = (6 + Math.random() * 8) + 'px';
    el.style.height   = (6 + Math.random() * 8) + 'px';
    el.style.animationDelay    = Math.random() * 1.5 + 's';
    el.style.animationDuration = (2 + Math.random() * 2) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

function loadQuestion() {
  if (qIndex >= shuffled.length) prepareQuestions();

  const q = shuffled[qIndex++];
  elapsed = 0;

  const correctAnswer  = q.a[q.correct];
  const shuffledAns    = shuffle(q.a);
  const newCorrectIdx  = shuffledAns.indexOf(correctAnswer);
  wrongIndices = shuffle(shuffledAns.map((_,i) => i).filter(i => i !== newCorrectIdx));

  // Category pill
  const cfg   = CAT_CONFIG[q.cat];
  const pill  = document.getElementById('cat-pill');
  pill.textContent = cfg.label;
  pill.className   = `cat-pill ${cfg.cls}`;

  // Emoji + question
  const emojiEl = document.getElementById('q-emoji');
  emojiEl.textContent = q.emoji;
  emojiEl.style.animation = 'none';
  emojiEl.offsetHeight;
  emojiEl.style.animation = '';

  const qEl = document.getElementById('question-text');
  qEl.style.animation = 'none';
  qEl.offsetHeight;
  qEl.style.animation = '';
  qEl.textContent = q.q;

  // Build answers
  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  shuffledAns.forEach((ans, i) => {
    const btn = document.createElement('div');
    btn.className = 'answer-btn';
    btn.id = `ans-${i}`;
    btn.dataset.correct = (i === newCorrectIdx) ? '1' : '0';
    btn.style.animationDelay = `${0.08 + i * 0.06}s`;
    btn.innerHTML = `
      <div class="answer-letter" style="background:${COLORS[i]}">${LETTERS[i]}</div>
      <div class="answer-text">${ans}</div>
    `;
    grid.appendChild(btn);
  });

  // Reset timer
  const bar = document.getElementById('timer-bar');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.className = 'timer-bar';
  document.getElementById('timer-seconds').textContent = TOTAL_SECONDS;
  document.getElementById('timer-seconds').className   = 'timer-seconds';
  document.getElementById('next-hint').textContent     = '⏱ seconds left';

  if (timer) clearInterval(timer);
  elapsed = 0;
  updateTimerDisplay();
  timer = setInterval(tick, 1000);
}

function updateTimerDisplay() {
  const remaining = TOTAL_SECONDS - elapsed;
  const pct       = (remaining / TOTAL_SECONDS) * 100;
  const bar       = document.getElementById('timer-bar');
  bar.style.transition = 'width 1s linear';
  bar.style.width = pct + '%';
  document.getElementById('timer-seconds').textContent = Math.max(0, remaining);
  if (remaining <= 8) {
    bar.className = 'timer-bar warning';
    document.getElementById('timer-seconds').className = 'timer-seconds warning';
  }
}

function tick() {
  elapsed++;
  updateTimerDisplay();

  if (elapsed === ELIM_1) {
    const idx = wrongIndices[0];
    if (idx !== undefined) document.getElementById(`ans-${idx}`)?.classList.add('eliminated');
  }
  if (elapsed === ELIM_2) {
    const idx = wrongIndices[1];
    if (idx !== undefined) document.getElementById(`ans-${idx}`)?.classList.add('eliminated');
  }
  if (elapsed >= TOTAL_SECONDS) {
    clearInterval(timer);
    revealAnswer();
  }
}

function revealAnswer() {
  document.querySelectorAll('.answer-btn').forEach(btn => {
    if (btn.dataset.correct !== '1') btn.classList.add('eliminated');
    else btn.classList.add('correct');
  });

  // Score + celebrate
  score++;
  spawnConfetti();

  const msg = CELEBRATE_MESSAGES[Math.floor(Math.random() * CELEBRATE_MESSAGES.length)];
  document.getElementById('cel-emoji').textContent = msg.emoji;
  document.getElementById('cel-text').textContent  = msg.text;
  const cel = document.getElementById('celebrate');
  cel.classList.add('show');

  document.getElementById('next-hint').textContent = '🎉 Next question coming...';

  setTimeout(() => {
    cel.classList.remove('show');
    setTimeout(loadQuestion, 700);
  }, 5000);
}

// ── START ──
prepareQuestions();
loadQuestion();
</script>
